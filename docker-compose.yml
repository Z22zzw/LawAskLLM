services:

  # ── MySQL（仅绑定本机，避免公网暴露）──
  mysql:
    image: mysql:8.0
    container_name: law_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-lawllm2026}
      MYSQL_DATABASE: ${MYSQL_DB:-law_llm}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # 避免与宿主机其它 MySQL 抢 3306；容器内仍用 3306
      - "127.0.0.1:13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_PASSWORD:-lawllm2026}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI 后端 ──
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: law_backend
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      PYTHONPATH: /workspace/backend
    volumes:
      - ./向量数据库:/workspace/向量数据库
      - ./data:/workspace/data
      - ./uploads:/workspace/uploads
      - ./历史聊天信息存储:/workspace/历史聊天信息存储
      - ./实验结果:/workspace/实验结果
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      # 避免与宿主机 projects 的 creator-api(8000) 冲突
      - "127.0.0.1:18081:8000"

  # ── Nginx：静态前端（多阶段构建）+ API ──
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: law_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    depends_on:
      - backend

volumes:
  mysql_data:

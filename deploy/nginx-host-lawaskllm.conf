# 复制到宿主机：/etc/nginx/conf.d/lawaskllm.conf（本机 nginx 只 include conf.d，不包含 sites-enabled）
# sudo cp /data/LawAskLLM/deploy/nginx-host-lawaskllm.conf /etc/nginx/conf.d/lawaskllm.conf
# sudo nginx -t && sudo systemctl reload nginx
#
# 反代到 Docker law_nginx（监听 127.0.0.1:18080）

server {
    listen 80;
    server_name 49.235.100.186;

    client_max_body_size 64m;

    access_log /var/log/nginx/lawaskllm_access.log;
    error_log  /var/log/nginx/lawaskllm_error.log warn;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 64m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    upstream backend {
        server backend:8000;
    }

    upstream streamlit_chat {
        server streamlit_chat:8501;
    }

    upstream streamlit_kb {
        server streamlit_kb:8502;
    }

    server {
        listen 80;
        server_name _;

        # ── 无尾斜杠 → 带尾斜杠（Streamlit 子路径） ──
        location = /old/chat {
            return 301 $scheme://$http_host/old/chat/;
        }
        location = /old/db {
            return 301 $scheme://$http_host/old/db/;
        }

        # ── Streamlit 对话（旧版测试入口） ──
        location /old/chat/ {
            proxy_pass         http://streamlit_chat/old/chat/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 86400;
        }

        # ── Streamlit 向量库管理 ──
        location /old/db/ {
            proxy_pass         http://streamlit_kb/old/db/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_read_timeout 86400;
        }

        # ── 前端静态资源 ──
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|svg|ico|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API 反向代理 ──
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            # 实验对照可并行多路 RAG，但总耗时仍可能较长；对话流式另依赖长连接
            proxy_read_timeout 900s;
        }

        location /api/docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}

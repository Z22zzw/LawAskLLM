name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend smoke check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Import backend app
        run: PYTHONPATH=backend python -c "from app.main import app; print(app.title)"

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  compose-validate:
    name: Docker compose validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Placeholder .env for compose validation
        run: cp .env.template .env

      - name: Validate compose file
        run: docker compose -f docker-compose.yml config

  compose-smoke:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare .env
        run: |
          cp .env.template .env
          {
            echo "APP_ENV=production"
            echo "JWT_SECRET_KEY=ci-smoke-secret"
            echo "MYSQL_PASSWORD=lawllm2026"
          } >> .env

      - name: Build and start services
        run: |
          docker compose -f docker-compose.yml up -d --build
          sleep 20

      - name: Health check
        run: |
          curl -fsS http://127.0.0.1:18081/health

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down -v

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy to production server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          SSH_KEY_PASSPHRASE: ${{ secrets.PROD_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/cd_deploy_key
          chmod 600 ~/.ssh/cd_deploy_key
          # 避免从 Windows/某些编辑器复制出的 CRLF 导致密钥或口令不匹配
          sed -i 's/\r$//' ~/.ssh/cd_deploy_key 2>/dev/null || true

          KEY="$HOME/.ssh/cd_deploy_key"
          # Secret 里不要带首尾换行；去掉 \r 避免「有口令却像卡住/失败」
          PASS="$(printf '%s' "${SSH_KEY_PASSPHRASE:-}" | tr -d '\r\n')"

          if [ -z "$PASS" ]; then
            # 加密私钥在无 TTY 下 ssh-add 会提示口令然后失败；未配口令时先检测并明确报错
            if ! timeout 20 ssh-keygen -y -f "$KEY" </dev/null >/dev/null 2>&1; then
              echo "::error::PROD_SSH_KEY 是加密私钥，但未配置 PROD_SSH_PASSPHRASE。请到 Actions Secrets 添加正确口令，或改用无口令部署密钥：ssh-keygen -t ed25519 -N '' -f key"
              exit 1
            fi
          else
            # </dev/null 防止 ssh-keygen 在个别环境下仍等待终端导致「卡住」
            if ! ssh-keygen -q -p -f "$KEY" -P "$PASS" -N "" </dev/null; then
              echo "::error::PROD_SSH_PASSPHRASE 与私钥不匹配，或私钥格式异常。请核对口令（无多余空格/换行），必要时重新生成密钥。"
              exit 1
            fi
          fi

          eval "$(ssh-agent -s)"
          ssh-add "$KEY" </dev/null
          rm -f "$KEY"
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "$GITHUB_ENV"

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PROD_PORT || 22 }}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Run production deploy script
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          DEPLOY_PORT="${PROD_PORT:-22}"
          # 默认与生产机常见 clone 路径一致；未设 Secret 时请改为你的实际目录
          DEPLOY_PATH="${PROD_PATH:-/data/LawAskLLM}"
          ssh -p "$DEPLOY_PORT" "${PROD_USER}@${PROD_HOST}" "cd '$DEPLOY_PATH' && bash scripts/deploy-prod.sh '$DEPLOY_PATH' main"

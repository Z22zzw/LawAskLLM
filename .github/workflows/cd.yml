name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  deploy-production:
    name: Deploy to production server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_KEY }}
          SSH_KEY_PASSPHRASE: ${{ secrets.PROD_SSH_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/cd_deploy_key
          chmod 600 ~/.ssh/cd_deploy_key
          eval "$(ssh-agent -s)"
          if [ -n "${SSH_KEY_PASSPHRASE:-}" ]; then
            # askpass 子进程不会继承 env，口令写入临时文件由脚本 cat 输出（避免挂起）
            PP_FILE="$(mktemp)"
            printf '%s\n' "$SSH_KEY_PASSPHRASE" > "$PP_FILE"
            chmod 600 "$PP_FILE"
            printf '%s\n' '#!/bin/sh' "cat \"${PP_FILE}\"" > /tmp/git-askpass.sh
            chmod 700 /tmp/git-askpass.sh
            DISPLAY=:0 SSH_ASKPASS_REQUIRE=force SSH_ASKPASS=/tmp/git-askpass.sh ssh-add ~/.ssh/cd_deploy_key
            rm -f /tmp/git-askpass.sh "$PP_FILE"
          else
            ssh-add ~/.ssh/cd_deploy_key
          fi
          rm -f ~/.ssh/cd_deploy_key
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK}" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=${SSH_AGENT_PID}" >> "$GITHUB_ENV"

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PROD_PORT || 22 }}" "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Run production deploy script
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          DEPLOY_PORT="${PROD_PORT:-22}"
          # 默认与生产机常见 clone 路径一致；未设 Secret 时请改为你的实际目录
          DEPLOY_PATH="${PROD_PATH:-/data/LawAskLLM}"
          ssh -p "$DEPLOY_PORT" "${PROD_USER}@${PROD_HOST}" "cd '$DEPLOY_PATH' && bash scripts/deploy-prod.sh '$DEPLOY_PATH' main"

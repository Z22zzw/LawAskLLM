# 生产部署改为「服务器拉取式」：见 scripts/deploy-pull.sh 与 deploy/lawask-pull-deploy.*.timer
# 本工作流仅在合并到 main 后做编排校验，不再从 GitHub SSH 登录生产机（避免境外 IP 告警与安全风险）。

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-main-smoke
  cancel-in-progress: true

jobs:
  compose-smoke:
    name: Compose config smoke (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Placeholder .env for compose validation
        run: cp .env.example .env

      - name: Validate docker compose
        run: docker compose -f docker-compose.yml config
